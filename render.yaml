services:
  - type: web
    name: class-family
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: class-family-db
          property: connectionString
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"

databases:
  - name: class-family-db
    plan: free
